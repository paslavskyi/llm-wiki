name: Feature request
description: Suggest an improvement to the engine, skills, or docs
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The motivation / use case behind the request.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This keeps the engine dependency-light and deterministic
        - label: This respects the invariants in CLAUDE.md
