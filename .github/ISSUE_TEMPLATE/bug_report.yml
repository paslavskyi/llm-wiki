name: Bug report
description: Something in the engine/tooling isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for the report! Please reproduce against the empty template if you can.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what actually happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node version
      description: Output of `node --version`
      placeholder: v24.16.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Windows 11 / macOS 14 / Ubuntu 24.04
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Test output, error messages, etc.
      render: shell
